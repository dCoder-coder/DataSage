name: Code Quality

on:
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  pull-requests: write

jobs:
  detekt:
    name: Kotlin Static Analysis (Detekt)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Fix Gradle wrapper permissions
        run: sed -i 's/\r$//' gradlew && chmod +x gradlew

      - name: Run Detekt (if configured)
        run: |
          if ./gradlew tasks --all --no-daemon | grep -q "detekt"; then
            ./gradlew detekt --no-daemon
          else
            echo "Detekt not configured — skipping"
          fi
        continue-on-error: true

  apk-size:
    name: APK Size Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Fix Gradle wrapper permissions
        run: sed -i 's/\r$//' gradlew && chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Report APK size
        run: |
          APK_PATH=$(find app/build/outputs/apk/debug -name "*.apk" | head -1)
          if [ -n "$APK_PATH" ]; then
            SIZE=$(stat -f%z "$APK_PATH" 2>/dev/null || stat -c%s "$APK_PATH" 2>/dev/null || echo "unknown")
            SIZE_MB=$(echo "scale=2; $SIZE / 1048576" | bc 2>/dev/null || echo "N/A")
            echo "### 📦 APK Size: ${SIZE_MB} MB" >> $GITHUB_STEP_SUMMARY
            echo "Path: $APK_PATH" >> $GITHUB_STEP_SUMMARY
          fi
